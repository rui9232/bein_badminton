<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨打報名系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .event-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-join { background-color: #00b900; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .user-info { margin-bottom: 20px; display: flex; align-items: center; }
        .user-info img { width: 40px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="user-profile" class="user-info">
        <p>載入用戶資訊中...</p>
    </div>

    <h2>近期臨打活動</h2>
    <div id="event-list">
        <div class="event-card">
            <h3>週六羽球團 (中級)</h3>
            <p>地點：某某國民運動中心</p>
            <p>費用：$250 | 剩餘名額：3</p>
            <button class="btn-join" onclick="register()">我要報名</button>
        </div>
    </div>

    <script>
        // 初始化 LIFF
        async function main() {
            try {
                await liff.init({ liffId: "你的_LIFF_ID" }); // 這裡要換成你在 LINE Developers 申請到的 ID
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('user-profile').innerHTML = `
                        <img src="${profile.pictureUrl}" alt="headshot">
                        <span>你好，${profile.displayName}！準備好打球了嗎？</span>
                    `;
                }
            } catch (err) {
                console.error("LIFF 初始化失敗", err);
            }
        }

        function register() {
            alert("報名成功！(目前為模擬狀態)");
            // 這裡之後會對接資料庫 API
        }

        main();
    </script>
</body>
</html>
