<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>必IN 臨打小助手</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #00B900; margin-top: 0; text-align: center; }
        .user-box { background: #e8f5e9; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #2e7d32; text-align: center; }
        .match-card { border: 1px solid #eee; padding: 20px; border-radius: 15px; background: #fff; text-align: left; }
        .btn { background: #00B900; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error-log { font-size: 12px; color: red; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h2>必IN 臨打小助手</h2>
        <div id="userName" class="user-box">正在連線至 LINE...</div>

        <div class="match-card">
            <strong style="font-size: 1.2em;">週六下午羽球團 (測試)</strong><br>
            <p style="color: #666; margin: 10px 0;">
                📍 地點：必IN羽球館<br>
                💰 費用：$250 / 人
            </p>
            <button class="btn" id="regBtn" onclick="register()">我要報名 (+1)</button>
        </div>
        
        <div id="debugLog" class="error-log"></div>
    </div>

    <script>
        // --- 1. 設定區 (已填入你的正確資訊) ---
        const supabaseUrl = 'https://vdhqcyjjxzljelqpkyuo.supabase.co';
        const supabaseKey = 'sb_publishable_Q25ZWq1J0VYL7SVJbGVRHg_YVj--rkd';
        const liffId = '2008137674-5cDNlo0N'; 

        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
        let userProfile = null;

        function log(msg) {
            document.getElementById("debugLog").innerText += msg + "\n";
        }

        // --- 2. 初始化 LINE ---
        async function main() {
            try {
                log("正在初始化 LIFF...");
                await liff.init({ liffId: liffId });
                
                if (!liff.isLoggedIn()) {
                    log("尚未登入，導向登入頁...");
                    liff.login();
                } else {
                    log("登入成功，獲取個人資料...");
                    userProfile = await liff.getProfile();
                    document.getElementById("userName").innerText = "👋 哈囉，" + userProfile.displayName;
                }
            } catch (err) {
                document.getElementById("userName").innerText = "❌ 連線失敗";
                log("錯誤詳情: " + err.message);
            }
        }
        main();

        // --- 3. 報名功能 ---
        async function register() {
            if (!userProfile) {
                alert("尚未識別身分，請稍候。");
                return;
            }

            const btn = document.getElementById("regBtn");
            btn.innerText = "傳送中...";
            btn.disabled = true;

            try {
                const { error } = await supabase
                    .from('registrations')
                    .insert([
                        { 
                            line_id: userProfile.userId, 
                            user_name: userProfile.displayName,
                            status: 'confirmed' 
                        }
                    ]);

                if (error) {
                    alert("❌ 報名失敗\n代碼：" + error.code + "\n訊息：" + error.message);
                    btn.innerText = "我要報名 (+1)";
                    btn.disabled = false;
                } else {
                    alert("🎉 報名成功！資料已同步。");
                    btn.innerText = "已完成報名";
                    btn.style.background = "#ccc";
                }
            } catch (err) {
                alert("異常錯誤：" + err.message);
                btn.innerText = "我要報名 (+1)";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
