<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>除錯中</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2 id="msg">正在啟動 LIFF...</h2>
    <p id="error" style="color:red"></p>

    <script>
        async function test() {
            const msg = document.getElementById("msg");
            const errDiv = document.getElementById("error");
            try {
                // *** 這裡請填入你在控制台看到的 LIFF ID (例如 2008137674-...) ***
                await liff.init({ liffId: "2008137674-5cDNlo0N" }); 
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    msg.innerText = "成功！哈囉 " + profile.displayName;
                }
            } catch (err) {
                msg.innerText = "失敗了！";
                errDiv.innerText = "錯誤訊息: " + err.message;
            }
        }
        test();
    </script>
</body>
</html>
