<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>必IN 臨打小助手</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #00B900; margin-top: 0; }
        .user-box { background: #e8f5e9; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #2e7d32; }
        .match-card { border: 1px solid #eee; padding: 20px; border-radius: 15px; background: #fff; text-align: left; }
        .btn { background: #00B900; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .debug-info { font-size: 11px; color: #999; margin-top: 15px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>必IN 臨打小助手</h2>
        <div id="userName" class="user-box">正在連線至 LINE...</div>

        <div class="match-card">
            <strong style="font-size: 1.2em;">週六下午羽球團 (測試)</strong><br>
            <p style="color: #666; margin: 10px 0;">
                📍 地點：必IN羽球館<br>
                💰 費用：$250 / 人
            </p>
            <button class="btn" id="regBtn" onclick="register()">我要報名 (+1)</button>
        </div>
        
        <div id="debugLog" class="debug-info">系統狀態：準備初始化...</div>
    </div>

    <script>
        // 1. 基本設定 (已對應 image_e2868a.png 內容)
        const supabaseUrl = 'https://vdhqcyjjxzljelqpkyuo.supabase.co';
        const supabaseKey = 'sb_publishable_Q25ZWq1J0VYL7SVJbGVRHg_YVj--rkd';
        const liffId = '2008137674-5cDNlo0N'; 

        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
        let userProfile = null;

        function updateLog(msg) {
            document.getElementById("debugLog").innerText = "系統狀態：" + msg;
        }

        // 2. 初始化 LINE LIFF
        async function main() {
            try {
                updateLog("正在連線 LINE 伺服器...");
                await liff.init({ liffId: liffId });
                
                if (!liff.isLoggedIn()) {
                    updateLog("尚未登入 LINE，跳轉中...");
                    liff.login();
                } else {
                    userProfile = await liff.getProfile();
                    document.getElementById("userName").innerText = "👋 哈囉，" + userProfile.displayName;
                    updateLog("連線成功！歡迎使用。");
                }
            } catch (err) {
                document.getElementById("userName").innerText = "❌ 連線失敗";
                updateLog("錯誤原因：" + err.message);
                console.error(err);
            }
        }
        main();

        // 3. 報名功能 (存入 registrations 資料表)
        async function register() {
            if (!userProfile) {
                alert("尚未識別身分，請稍候。");
                return;
            }

            const btn = document.getElementById("regBtn");
            btn.innerText = "正在傳送...";
            btn.disabled = true;

            try {
                const { error } = await supabase
                    .from('registrations')
                    .insert([
                        { 
                            line_id: userProfile.userId, 
                            user_name: userProfile.displayName,
                            status: 'confirmed' 
                        }
                    ]);

                if (error) {
                    alert("❌ 報名失敗\n原因：" + error.message);
                    btn.innerText = "我要報名 (+1)";
                    btn.disabled = false;
                } else {
                    alert("🎉 報名成功！\n資料已存入雲端。");
                    btn.innerText = "已完成報名";
                    btn.style.background = "#ccc";
                }
            } catch (err) {
                alert("系統錯誤：" + err.message);
                btn.innerText = "我要報名 (+1)";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
